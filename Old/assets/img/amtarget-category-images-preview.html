<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AMTarget — фото по типах товару</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#10171a; color:#e9eef0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; padding:28px; }
  h1 { font-size:20px; font-weight:600; margin:0 0 6px; }
  p.sub { color:#9fb0b5; margin:0 0 24px; font-size:14px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }
  .card { background:#19232733; border:1px solid #2a3a40; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
  .thumb { aspect-ratio:1/1.1; background:#0c1316; display:flex; align-items:center; justify-content:center; }
  .thumb img { width:100%; height:100%; object-fit:contain; }
  .meta { padding:12px 14px 16px; }
  .cat { font-weight:600; font-size:15px; color:#f4d44d; }
  .prod { font-size:13px; color:#bcccd1; margin:4px 0 10px; }
  .file { font-size:12px; color:#7f9298; font-family:ui-monospace,monospace; }
  a.dl { display:inline-block; margin-top:10px; font-size:13px; color:#10171a; background:#f4d44d; padding:6px 12px; border-radius:8px; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <h1>AMTarget — по одному фото на кожен тип товару</h1>
  <p class="sub">Зіставлення категорій зі скріншота з товарами каталогу amtarget.net. Натисніть «Завантажити» або ПКМ → «Зберегти зображення як…».</p>
  <div class="grid" id="grid"></div>
<script>
const items = [
  {cat:"Мішені-гонги",     prod:"Гонг CombaT Sniper",            file:"misheni-gongy.jpg",        url:"https://amtarget.net/wp-content/uploads/2025/08/gong_combat_sniper.jpg"},
  {cat:"Тренувальні IPSC", prod:"Гонг IPSC 570x450",             file:"trenuvalni-ipsc.jpg",      url:"https://amtarget.net/wp-content/uploads/2025/02/ipsc.jpg"},
  {cat:"Поппери та рухомі",prod:"Мішенева установка Поппер",     file:"poppery-ta-ruhomi.jpg",    url:"https://amtarget.net/wp-content/uploads/2025/02/popper_1.jpg"},
  {cat:"Стенди та триноги",prod:"Тринога TR-M",                  file:"stendy-ta-trynogy.jpg",    url:"https://amtarget.net/wp-content/uploads/2025/05/tr-m.jpg"},
  {cat:"Кулеуловлювачі",   prod:"Кулеуловлювач HarD",            file:"kuleulovlyuvachi.jpg",     url:"https://amtarget.net/wp-content/uploads/2025/02/bullet_hard_1.jpg"},
  {cat:"Спеціальні",       prod:"Мішенева установка Texas Star", file:"speczialni-texas-star.jpg",url:"https://amtarget.net/wp-content/uploads/2025/08/texas_star_.jpg"},
];
const g = document.getElementById('grid');
for (const it of items) {
  const c = document.createElement('div'); c.className='card';
  c.innerHTML = `<div class="thumb"><img src="${it.url}" alt="${it.cat}" loading="lazy"></div>
    <div class="meta">
      <div class="cat">${it.cat}</div>
      <div class="prod">${it.prod}</div>
      <div class="file">${it.file}</div>
      <a class="dl" href="${it.url}" download="${it.file}">Завантажити</a>
    </div>`;
  g.appendChild(c);
}
</script>
</body>
</html>
